<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Centro recensioni FICSIT con rating animato e preview feedback.">
    <meta name="theme-color" content="#ff6a00">
    <title>Recensioni | FICSIT Restaurant OS</title>
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body data-page="reviews" style="--hero-image: url('assets/images/generated-burger.png')">
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="home.html"><span class="brand__mark">F</span><span>FICSIT RESTAURANT<span class="brand__sub">Feedback processing</span></span></a>
        <nav class="nav" aria-label="Navigazione cliente">
          <a class="nav__link" href="home.html">Home</a>
          <a class="nav__link" href="menu.html">Menu</a>
          <a class="nav__link" href="prenotazione.html">Prenota</a>
          <a class="nav__link" href="ordinazione.html">Ordina</a>
          <a class="nav__link" href="contatti.html">Contatti</a>
          <a class="nav__link" href="principale.php">Admin</a>
        </nav>
      </header>
      <main>
        <section class="hero">
          <div class="hero__content">
            <p class="eyebrow">Feedback analytics hub</p>
            <h1>Recensioni</h1>
            <p class="lead">Trasmetti una valutazione al centro analisi. La preview mostra il pacchetto dati prima dell'invio.</p>
          </div>
        </section>
        <section class="section booking-layout">
          <form id="reviewForm" class="form-panel form-grid">
            <div class="field field--full">
              <label>Rating operativo</label>
              <div class="stars" id="ratingStars" role="radiogroup" aria-label="Valutazione a stelle"></div>
              <input id="starsInput" name="stars" type="hidden" value="5">
            </div>
            <div class="field field--full"><label for="customerName">Nome</label><input id="customerName" name="customerName" required autocomplete="name"></div>
            <div class="field field--full"><label for="comment">Commento</label><textarea id="comment" name="comment" required minlength="8"></textarea></div>
            <button class="button button--solid field--full" type="submit">Invia feedback</button>
          </form>
          <aside class="panel" id="reviewPreview" aria-live="polite"></aside>
        </section>
        <section class="section">
          <div class="section__head">
            <div>
              <p class="eyebrow">Processed signals</p>
              <h2>Archivio feedback</h2>
            </div>
          </div>
          <div class="grid" id="reviewsList"></div>
        </section>
      </main>
      <footer class="footer">Recensioni sincronizzate con area admin.</footer>
    </div>
    <script type="module" src="assets/js/app.js"></script>
  </body>
</html>
