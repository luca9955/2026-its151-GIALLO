<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Futuristic industrial restaurant hub</title>
  <desc id="desc">Original orange and charcoal sci-fi factory environment used as a restaurant management hero background.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#070707"/>
      <stop offset=".45" stop-color="#151515"/>
      <stop offset="1" stop-color="#2b1608"/>
    </linearGradient>
    <radialGradient id="glow" cx=".55" cy=".5" r=".5">
      <stop stop-color="#ff6a00" stop-opacity=".75"/>
      <stop offset=".42" stop-color="#ff6a00" stop-opacity=".2"/>
      <stop offset="1" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#ff6a00" stroke-opacity=".08" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
